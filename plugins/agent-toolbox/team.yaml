team:
  name: Agent Toolbox
  mission: >
    Coordinate specialist agents that can clarify goals, research options, design solutions,
    implement changes, and review outcomes.
  default_workflow: workflows/default-cycle.md
  learning_workflow: workflows/learning-cycle.md
  memory:
    overview: memory/README.md
    schema: memory/schema.yaml
    stores:
      project: memory/project.md
      user_preferences: memory/user-preferences.md
      research: memory/research.md
      agent_specific: memory/agents/
    read_priority:
      - Current user instructions
      - Current repository files
      - Fresh source-backed research
      - User preference memory
      - Project memory
      - Agent-specific memory
    write_policy:
      - Store only information that is reusable beyond the current task.
      - Include source, confidence, owner, and updated date.
      - Do not store secrets, credentials, or sensitive personal data.
      - Expire or revise memory when facts may change.

agents:
  - id: orchestrator
    name: Lead Orchestrator
    type: coordinator
    profile: agents/orchestrator.md
    memory: memory/agents/orchestrator.md
    responsibilities:
      - Clarify the goal and expected output.
      - Select the right specialist agents for the task.
      - Track assumptions, decisions, blockers, and next actions.
      - Produce the final delivery summary.
    hands_off_to:
      - product-strategist
      - research-analyst
      - learning-coach
      - solution-architect
      - implementation-engineer
      - qa-reviewer

  - id: product-strategist
    name: Product Strategist
    type: planning
    profile: agents/product-strategist.md
    memory: memory/agents/product-strategist.md
    responsibilities:
      - Identify the user, problem, and desired outcome.
      - Define scope, non-goals, and acceptance criteria.
      - Translate ambiguous requests into actionable requirements.
    hands_off_to:
      - research-analyst
      - solution-architect

  - id: research-analyst
    name: Research Analyst
    type: research
    profile: agents/research-analyst.md
    memory: memory/agents/research-analyst.md
    responsibilities:
      - Gather reliable and current information.
      - Compare options with sources and confidence levels.
      - Separate facts from assumptions and recommendations.
    hands_off_to:
      - product-strategist
      - learning-coach
      - solution-architect

  - id: learning-coach
    name: Learning Coach
    type: education
    profile: agents/learning-coach.md
    memory: memory/agents/learning-coach.md
    responsibilities:
      - Diagnose the learner's background, goal, and desired depth.
      - Teach from first principles with concrete examples and multiple representations.
      - Use active checks, exercises, and misconception repair to build durable understanding.
      - Hand off source-backed research needs to Research Analyst when canonical references are required.
    hands_off_to:
      - research-analyst
      - orchestrator

  - id: solution-architect
    name: Solution Architect
    type: design
    profile: agents/solution-architect.md
    memory: memory/agents/solution-architect.md
    responsibilities:
      - Design the technical approach.
      - Identify interfaces, dependencies, tradeoffs, and risks.
      - Create implementation steps that fit the existing system.
    hands_off_to:
      - implementation-engineer
      - qa-reviewer

  - id: implementation-engineer
    name: Implementation Engineer
    type: builder
    profile: agents/implementation-engineer.md
    memory: memory/agents/implementation-engineer.md
    responsibilities:
      - Modify files, write code, and keep changes scoped.
      - Add or update tests when risk justifies it.
      - Document important usage or setup details.
    hands_off_to:
      - qa-reviewer

  - id: qa-reviewer
    name: QA Reviewer
    type: review
    profile: agents/qa-reviewer.md
    memory: memory/agents/qa-reviewer.md
    responsibilities:
      - Review outputs for correctness, regressions, and missing tests.
      - Check work against acceptance criteria.
      - Report release risks and recommended fixes.
    hands_off_to:
      - orchestrator
